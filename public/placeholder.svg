<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0C3347"/>
      <stop offset="100%" stop-color="#1A5E78"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="400" height="300" fill="url(#bg)"/>

  <!-- Image icon — centred, white, 30% opacity -->
  <g transform="translate(200,150)" opacity="0.3" stroke="white" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <!-- Frame -->
    <rect x="-60" y="-46" width="120" height="92" rx="10"/>
    <!-- Sun circle -->
    <circle cx="-28" cy="-18" r="14"/>
    <!-- Mountain peaks -->
    <polyline points="-60,46 -20,4 14,34 38,10 60,46"/>
  </g>
</svg>
